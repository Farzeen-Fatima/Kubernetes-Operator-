apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # Name must be in the form: <plural>.<group>
  name: webpages.devops.example.com
spec:
  # Group for the custom resource
  group: devops.example.com
  
  # List of versions supported by this CRD
  versions:
    - name: v1
      # Indicates this version is served via REST APIs
      served: true
      # Indicates this is the storage version (only one version can be storage)
      storage: true
      
      # Schema validation for the custom resource
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - html
              properties:
                html:
                  type: string
                  description: "HTML content to serve"
                  minLength: 1
                replicas:
                  type: integer
                  description: "Number of nginx pod replicas"
                  minimum: 0
                  maximum: 10
                  default: 1
            
            # Status subresource - managed by the operator
            status:
              type: object
              properties:
                status:
                  type: string
                  description: "Current status of the WebPage (e.g., Ready, Pending, Error)"
                serviceIP:
                  type: string
                  description: "ClusterIP of the created service"
                message:
                  type: string
                  description: "Human-readable status message"
      
      # Enable status subresource
      subresources:
        status: {}
      
      # Additional printer columns for 'kubectl get webpages'
      additionalPrinterColumns:
        - name: Status
          type: string
          description: Current status
          jsonPath: .status.status
        - name: Service IP
          type: string
          description: Service ClusterIP
          jsonPath: .status.serviceIP
        - name: Replicas
          type: integer
          description: Number of replicas
          jsonPath: .spec.replicas
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  
  # Scope can be 'Namespaced' or 'Cluster'
  scope: Namespaced
  
  # Names for the custom resource
  names:
    # Plural name to be used in URLs
    plural: webpages
    # Singular name to be used as an alias
    singular: webpage
    # Kind is normally the CamelCased singular type
    kind: WebPage
    # Short names for CLI convenience
    shortNames:
      - wp